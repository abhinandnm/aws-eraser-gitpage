site_name: AWS Eraser
site_url: https://abhinandnm.github.io/aws-eraser-gitpage/
site_description: Fastest zero-cloud-setup CLI utility to scan, audit, and clean active billing resources across all AWS regions.
site_author: Abhinandan (abhinandnm)

repo_name: abhinandnm/aws-eraser-gitpage
repo_url: https://github.com/abhinandnm/aws-eraser-gitpage
edit_uri: blob/main/docs/

theme:
  name: material
  language: en
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Usage & Selective Purge: usage.md
  - Supported Resources: resources.md
  - IAM & Billing Setup: iam-setup.md
  - Search FAQ & Troubleshooting: faq.md
